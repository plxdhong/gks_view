name: Release Version Gate

on:
  pull_request:
    branches:
      - release

permissions:
  contents: read

jobs:
  vscode-extension-version-bump:
    name: vscode-extension-version-bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Require extension version bump
        run: bun scripts/check-vscode-extension-version-bump.mjs "${{ github.event.pull_request.base.sha }}"
