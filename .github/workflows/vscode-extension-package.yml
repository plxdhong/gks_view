name: VSCode Extension Package

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vscode-extension-package:
    name: vscode-extension-package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Require release version bump
        if: github.event_name == 'push'
        run: bun scripts/check-vscode-extension-version-bump.mjs "${{ github.event.before }}"

      - name: Package VSCode extension
        run: bun run package:vscode

      - name: Read extension version
        id: extension
        run: |
          version=$(bun -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('packages/vscode-extension/package.json', 'utf8')); console.log(pkg.version)")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=vscode-extension-v${version}" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        run: bun scripts/read-vscode-release-notes.mjs "${{ steps.extension.outputs.version }}" > release-notes.md

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix-${{ github.sha }}
          path: build/vsix/*.vsix
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.extension.outputs.tag }}" build/vsix/*.vsix \
            --target "$GITHUB_SHA" \
            --title "Geometry Kernel Workbench VSCode Extension ${{ steps.extension.outputs.version }}" \
            --notes-file release-notes.md
