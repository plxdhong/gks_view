name: VSCode Extension CI

on:
  pull_request:
    branches:
      - main
      - release
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  vscode-extension-build:
    name: vscode-extension-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate mock artifacts
        run: bun run generate:mocks

      - name: Validate mock artifacts
        run: bun run validate:mocks

      - name: Build packages
        run: bun run build

      - name: Verify mock adapter
        run: bun run verify:adapter
